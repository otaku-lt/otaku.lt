  description: |
    Games have long transcended screens.
    Today, they create communities, shape careers, become culture, and become the language that connects different generations.
    GameOn is a place where all of this comes together at once.

    October 23-25, LITEXPO opens its doors to the biggest video game culture event in the Baltic states. For three days, the entire gaming ecosystem will come alive – from the latest technologies and just-born ideas to nostalgia, creativity, and shared action.

    GameOn connects those who:
    - create games and those who play them;
    - seek their first experience and those who already shape the industry's future;
    - come for entertainment and those who work, study, or invest here.

    This isn't an event you watch from the sidelines.
    This is an experience you participate in.

    What will you find at GameOn?
    - Interactive EXPO and GameVerse spaces with new, indie, VR, experimental, and time-tested games;
    - Esports tournaments, show matches, and unexpected special performances;
    - A cosplay scene where skill, imagination, and community meet;
    - Retro, arcade, board games, and Eduverse spaces for different experiences and ages;
    - An Artist Alley zone where independent artists present their creations;
    - For the first time, the GameOn Game Content Creator Awards, honoring creators who shape Lithuania's gaming community.

    GameOn is a space where games become a shared experience.
    Where everyone finds their role – player, creator, viewer, or visionary.

