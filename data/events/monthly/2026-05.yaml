  date: '2026-05-16'
  time: 'All day'
  location: 'Katedros Aikštė, Vilnius'
  category: concert
  description: |
    Korniha Band performs at Gatvės Muzikos Diena (Street Music Day) in the heart of Vilnius!
    
    Join us for a special outdoor performance at Cathedral Square as part of Lithuania's annual celebration of street music. Korniha Band brings their unique energy and Lithuanian set to this vibrant public event.
    
    Street Music Day is a beloved tradition in Lithuania, transforming city streets into stages for musicians of all genres. Come enjoy the atmosphere and support local music!

