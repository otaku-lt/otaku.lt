- id: 55
  title: '🇵🇱 Pyrkon 2026 - Fantastyczne Miejsce Spotkań'
  date: '2026-06-19'
  endDate: '2026-06-21'
  time: 'All day'
  location: 'Międzynarodowe Targi Poznańskie, Hala nr 2, Poznań, Poland'
  category: 'convention'
  description: |
    Pyrkon is Poland's largest fantasy convention and one of the biggest pop-culture events in Central Europe!
    This three-day celebration brings together tens of thousands of fans of fantasy, sci-fi, anime, gaming, and more.
    
    Event highlights:
    - Cosplay Zone with competitions and showcases
    - Manga and Anime Zone dedicated to Japanese pop culture
    - Gaming Zone (video games, board games, wargames, card games)
    - Artists and Collectors Alley
    - Concerts and live performances
    - Film and TV Series Zone
    - Literature Zone and comic books
    - Science Zone with special guests
    - Workshop Zone with creative sessions
    - RPG Zone for tabletop gaming
    - LEGO Fans Zone
    - Star Wars Zone
    - Kids' Zone for young fans
    
    Pyrkon features international guests, authors, artists, and creators from around the world.
    The convention is known for its inclusive atmosphere and diverse programming covering all aspects of fantasy and pop culture.
    
    Note: This is an international event in Poznań, Poland. Travel and accommodation not included.
  featured: true
  organizer: 'Pyrkon Foundation'
  link: 'https://pyrkon.pl/en/'
  image: '/images/events/2026/06/2026-06-pyrkon.jpg'

