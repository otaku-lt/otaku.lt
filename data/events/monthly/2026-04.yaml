  category: 'convention'
  description: |
    J-TSOON is Estonia's premier pop-culture festival celebrating anime, cosplay, K-POP, gaming, and more!
    This two-day event brings together fans from across the Baltic region and beyond.
    
    Event highlights:
    - Cosplay competitions (Cosplay World Masters, Nordic Cosplay Championship qualifiers)
    - K-POP dance competitions (Group and Solo Cover Dance)
    - Gaming zone and tournaments
